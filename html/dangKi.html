<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tạo tài khoản AyaBook để mua sách, lưu yêu thích và theo dõi đơn hàng dễ dàng.">
    <title>Đăng ký – AyaBook</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/fonts/themify-icons/themify-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page-body">

    <main class="auth-page">
        <div class="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <a href="../index.html" class="auth-logo">AyaBook</a>
                <h1>Tạo tài khoản mới</h1>
                <p>Tham gia cộng đồng yêu sách của chúng tôi</p>
            </div>

            <!-- Body -->
            <div class="auth-body">

                <div class="auth-alert auth-alert-error" id="regError" role="alert">
                    <i class="ti-alert"></i>
                    <span id="regErrorMsg">Vui lòng kiểm tra lại thông tin!</span>
                </div>

                <!-- Tên -->
                <div class="mb-3">
                    <label for="regName" class="form-label">Họ và tên</label>
                    <input type="text" class="form-control" id="regName" placeholder="Nguyễn Văn A" autocomplete="name"
                        required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Địa chỉ email</label>
                    <input type="email" class="form-control" id="regEmail" placeholder="example@email.com"
                        autocomplete="email" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="regPassword" class="form-label">Mật khẩu</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="regPassword" placeholder="Ít nhất 6 ký tự"
                            autocomplete="new-password" required>
                        <button class="btn" type="button" onclick="togglePasswordVisibility('regPassword', this)"
                            aria-label="Hiện/ẩn mật khẩu">
                            <i class="ti-lock"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label for="regPasswordConfirm" class="form-label">Xác nhận mật khẩu</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="regPasswordConfirm"
                            placeholder="Nhập lại mật khẩu" autocomplete="new-password" required>
                        <button class="btn" type="button" onclick="togglePasswordVisibility('regPasswordConfirm', this)"
                            aria-label="Hiện/ẩn mật khẩu">
                            <i class="ti-lock"></i>
                        </button>
                    </div>
                </div>

                <!-- Terms -->
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="agree">
                    <label class="form-check-label" for="agree" style="font-size:13px;">
                        Tôi đồng ý với <a href="#" class="auth-link">Điều khoản dịch vụ</a> và <a href="#"
                            class="auth-link">Chính sách bảo mật</a>
                    </label>
                </div>

                <button type="button" class="btn-auth" id="regBtn" onclick="doRegister()">
                    <i class="ti-user"></i> Tạo tài khoản
                </button>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Đã có tài khoản? <a href="dangNhap.html" class="auth-link">Đăng nhập ngay</a></p>
                <a href="../index.html" class="back-home">
                    <i class="ti-arrow-left"></i> Về trang chủ
                </a>
            </div>
        </div>
    </main>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>

    <script>
        function doRegister() {
            var name = $('#regName').val().trim();
            var email = $('#regEmail').val().trim();
            var pass = $('#regPassword').val();
            var passConfirm = $('#regPasswordConfirm').val();
            var agree = $('#agree').is(':checked');
            var $err = $('#regError');
            var $errMsg = $('#regErrorMsg');
            var $btn = $('#regBtn');

            $err.hide();

            if (!name || !email || !pass || !passConfirm) {
                $errMsg.text('Vui lòng nhập đầy đủ thông tin!'); $err.fadeIn(); return;
            }
            var emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailReg.test(email)) {
                $errMsg.text('Vui lòng nhập địa chỉ email hợp lệ!'); $err.fadeIn(); return;
            }
            if (pass.length < 6) {
                $errMsg.text('Mật khẩu phải có ít nhất 6 ký tự!'); $err.fadeIn(); return;
            }
            if (pass !== passConfirm) {
                $errMsg.text('Mật khẩu xác nhận không khớp!'); $err.fadeIn();
                $('#regPasswordConfirm').css('border-color', '#EF4444'); return;
            }
            if (!agree) {
                $errMsg.text('Bạn phải đồng ý với điều khoản dịch vụ!'); $err.fadeIn(); return;
            }

            localStorage.setItem('email', email);
            localStorage.setItem('password', pass);
            localStorage.setItem('name', name);

            $btn.html('<i class="ti-check"></i> Đăng ký thành công!').addClass('btn-success-state').prop('disabled', true);
            setTimeout(function () { window.location.href = 'dangNhap.html'; }, 900);
        }

        function togglePasswordVisibility(inputId, btn) {
            var $input = $('#' + inputId);
            var $icon = $(btn).find('i');
            if ($input.attr('type') === 'password') {
                $input.attr('type', 'text');
                $icon.removeClass('ti-lock').addClass('ti-unlock');
            } else {
                $input.attr('type', 'password');
                $icon.removeClass('ti-unlock').addClass('ti-lock');
            }
        }

        $('#regPasswordConfirm').on('input', function () { $(this).css('border-color', ''); });
        $(document).on('keydown', function (e) { if (e.key === 'Enter') doRegister(); });
    </script>
</body>

</html>
