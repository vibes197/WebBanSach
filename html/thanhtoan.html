<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán – AyaBook</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/fonts/themify-icons/themify-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/thanhtoan.css">
</head>

<body>
    <div class="container-fluid px-4 px-lg-5" style="padding-top: 90px;">

        <div class="breadcrumb-wrap">
            <a href="../index.html" class="breadcrumb-btn">
                <i class="ti-home"></i>
                <span class="bc-sep">›</span>
                <a href="donhang.html" style="color:inherit;text-decoration:none;">Đơn hàng</a>
                <span class="bc-sep">›</span>
                <span>Thanh toán</span>
            </a>
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-7">

                <div class="form-section">
                    <h3><i class="ti-location-pin me-2"></i>Thông tin giao hàng</h3>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Họ và tên *</label>
                            <input type="text" class="form-control" id="ho-ten" placeholder="Nguyễn Văn A">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại *</label>
                            <input type="tel" class="form-control" id="sdt" placeholder="0912 345 678">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email-tt" placeholder="example@email.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Địa chỉ giao hàng *</label>
                            <input type="text" class="form-control" id="dia-chi"
                                placeholder="Số nhà, đường, phường/xã...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tỉnh/Thành phố</label>
                            <select class="form-select">
                                <option selected>Hà Nội</option>
                                <option>TP. Hồ Chí Minh</option>
                                <option>Đà Nẵng</option>
                                <option>Cần Thơ</option>
                                <option>Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Ghi chú</label>
                            <input type="text" class="form-control" placeholder="Giao giờ hành chính...">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3><i class="ti-credit-card me-2"></i>Phương thức thanh toán</h3>
                    <div class="payment-method selected" onclick="selectPayment(this)">
                        <input type="radio" name="payment" id="pay-cod" value="cod" checked>
                        <i class="ti-wallet" style="font-size:20px; color:#F59E0B;"></i>
                        <label for="pay-cod">Thanh toán khi nhận hàng (COD)</label>
                    </div>
                    <div class="payment-method" onclick="selectPayment(this)">
                        <input type="radio" name="payment" id="pay-bank" value="bank">
                        <i class="ti-money" style="font-size:20px; color:#3B82F6;"></i>
                        <label for="pay-bank">Chuyển khoản ngân hàng</label>
                    </div>
                    <div class="payment-method" onclick="selectPayment(this)">
                        <input type="radio" name="payment" id="pay-momo" value="momo">
                        <i class="ti-mobile" style="font-size:20px; color:#BE185D;"></i>
                        <label for="pay-momo">Ví MoMo</label>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-5">
                <div class="order-mini">
                    <h3 style="font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:1px;">Đơn hàng
                        của bạn</h3>
                    <div id="mini-items"></div>
                    <div class="d-flex justify-content-between mb-1" style="font-size:14px;">
                        <span>Tạm tính:</span><span id="tt-subtotal" class="fw-600">0đ</span>
                    </div>
                    <div class="d-flex justify-content-between mb-1" style="font-size:14px;">
                        <span>Phí vận chuyển:</span><span class="fw-600" style="color:#3d8b5e;">Miễn phí</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold" style="font-size:16px;">
                        <span>Tổng cộng:</span><span id="tt-total" style="color:#e53935;">0đ</span>
                    </div>
                    <button class="btn-place-order" onclick="placeOrder()">
                        <i class="ti-bag"></i> Đặt hàng ngay
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="aya-footer">
        <div class="container-fluid px-4 px-lg-5">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                <div class="footer-copy">
                    <p>&copy; 2026 <strong>AyaBook</strong>. All rights reserved.</p>
                    <p class="footer-sub">Mua sách online dễ dàng &amp; chuyên nghiệp.</p>
                </div>
                <div class="footer-social text-center">
                    <p>KẾT NỐI VỚI CHÚNG TÔI</p>
                    <div class="social-icons">
                        <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook"><i
                                class="ti-facebook"></i></a>
                        <a href="https://www.youtube.com/" target="_blank" aria-label="YouTube"><i
                                class="ti-youtube"></i></a>
                        <a href="https://www.instagram.com/" target="_blank" aria-label="Instagram"><i
                                class="ti-instagram"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <div id="aya-toast-container"></div>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/navbar.js"></script>

    <script>
        function parsePrice(str) { return parseInt((str || '0').replace(/[^\d]/g, ''), 10) || 0; }
        function formatPrice(n) { return n.toLocaleString('vi-VN') + 'đ'; }

        var cartItems = JSON.parse(localStorage.getItem(window.getCartKey()) || '[]');
        var subtotal = cartItems.reduce(function (s, i) { return s + parsePrice(i.price) * (i.qty || 1); }, 0);
        function fixImgPath(src) {
            if (!src) return '';
            if (src.startsWith('img/')) return '../' + src;
            return src;
        }

        $('#mini-items').html(cartItems.map(function (item) {
            return '<div class="mini-item"><img src="' + fixImgPath(item.img) + '" class="mini-img" alt=""><div><div style="font-size:13px;font-weight:600;">' + item.name + '</div><div style="font-size:12px;color:var(--aya-muted);">x' + (item.qty || 1) + '</div><div style="font-size:13px;color:#e53935;font-weight:600;">' + item.price + '</div></div></div>';
        }).join(''));

        $('#tt-subtotal, #tt-total').text(formatPrice(subtotal));

        function selectPayment(el) {
            $('.payment-method').removeClass('selected');
            $(el).addClass('selected');
            $(el).find('input[type="radio"]').prop('checked', true);
        }

        function placeOrder() {
            var name = $('#ho-ten').val().trim();
            var phone = $('#sdt').val().trim();
            var addr = $('#dia-chi').val().trim();

            if (!name || !phone || !addr) {
                ayaShowToast('Vui lòng điền đầy đủ thông tin giao hàng!', 'warning');
                return;
            }
            localStorage.removeItem(window.getCartKey());
            window.location.href = 'thanhcong.html';
        }
    </script>
</body>

</html>
